<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoRush Multiplayer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --neon-cyan: #00f5ff;
    --neon-yellow: #ffee00;
    --neon-pink: #ff0090;
    --neon-green: #00ff88;
    --bg-dark: #07080f;
    --bg-panel: rgba(255,255,255,0.04);
    --border-glow: rgba(0,245,255,0.3);
    --text-main: #e8f4ff;
    --text-dim: #5a7a9a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── SCANLINE OVERLAY ── */
  body::after {
    content:'';
    position:fixed;
    inset:0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events:none;
    z-index:9999;
  }

  /* ── SCREENS ── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    transition: opacity 0.4s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }
  #countdownScreen { transition: none; }

  /* ── ANIMATED GRID BG ── */
  #bgCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  .screen { z-index: 1; }
  #gameCanvas { z-index: 1; position: fixed; inset: 0; width: 100%; height: 100%; }

  /* ── TITLE ── */
  .title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(2rem, 6vw, 4rem);
    letter-spacing: 0.15em;
    color: var(--neon-cyan);
    text-shadow:
      0 0 10px var(--neon-cyan),
      0 0 40px var(--neon-cyan),
      0 0 80px rgba(0,245,255,0.4);
    margin-bottom: 8px;
    text-align: center;
  }
  .subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px var(--neon-yellow);
    margin-bottom: 40px;
    text-transform: uppercase;
  }

  /* ── PANEL ── */
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border-glow);
    border-radius: 4px;
    padding: 28px 32px;
    width: 100%;
    max-width: 480px;
    backdrop-filter: blur(12px);
    box-shadow:
      0 0 40px rgba(0,245,255,0.05),
      inset 0 0 40px rgba(0,245,255,0.02);
  }

  /* ── INPUTS ── */
  .field-label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--neon-cyan);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  input[type=text] {
    width: 100%;
    background: rgba(0,245,255,0.05);
    border: 1px solid rgba(0,245,255,0.25);
    border-radius: 2px;
    padding: 10px 14px;
    color: var(--text-main);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
  }
  input[type=text]:focus {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.3);
  }
  input[type=text]::placeholder { color: var(--text-dim); }

  /* ── COLOR SWATCHES ── */
  .color-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .swatch:hover { transform: scale(1.2); }
  .swatch.selected {
    border-color: #fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.6);
    transform: scale(1.15);
  }

  /* ── ICON SHAPES ── */
  .shape-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .shape-btn {
    flex: 1;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,245,255,0.05);
    border: 1px solid rgba(0,245,255,0.2);
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    position: relative;
    gap: 8px;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    flex-direction: column;
  }
  .shape-btn canvas { pointer-events: none; }
  .shape-btn:hover, .shape-btn.selected {
    background: rgba(0,245,255,0.12);
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
  }

  /* ── BUTTONS ── */
  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 2px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .btn-primary {
    background: var(--neon-cyan);
    color: #000;
    box-shadow: 0 0 20px rgba(0,245,255,0.4);
  }
  .btn-primary:hover {
    background: #fff;
    box-shadow: 0 0 30px rgba(0,245,255,0.8);
    transform: translateY(-1px);
  }
  .btn-secondary {
    background: transparent;
    color: var(--neon-cyan);
    border: 1px solid var(--neon-cyan);
  }
  .btn-secondary:hover {
    background: rgba(0,245,255,0.1);
    box-shadow: 0 0 15px rgba(0,245,255,0.2);
  }
  .btn-danger {
    background: transparent;
    color: var(--neon-pink);
    border: 1px solid var(--neon-pink);
  }
  .btn-danger:hover { background: rgba(255,0,144,0.1); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* ── ROOM CODE ── */
  .room-code-display {
    text-align: center;
    margin-bottom: 20px;
  }
  .room-code-display .code {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--neon-yellow);
    text-shadow: 0 0 20px var(--neon-yellow);
    letter-spacing: 0.3em;
    cursor: pointer;
  }
  .room-code-display .hint {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-top: 4px;
  }

  /* ── PLAYER LIST ── */
  #playerList {
    max-height: 180px;
    overflow-y: auto;
    margin-bottom: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--neon-cyan) transparent;
  }
  .player-entry {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.85rem;
  }
  .player-entry .pip {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }
  .player-entry .name { flex: 1; }
  .player-entry .status {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    padding: 2px 6px;
    border-radius: 2px;
  }
  .status-ready { color: var(--neon-green); border: 1px solid var(--neon-green); }
  .status-waiting { color: var(--text-dim); border: 1px solid var(--text-dim); }

  /* ── COUNTDOWN ── */
  #countdownScreen {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(5rem, 20vw, 12rem);
    font-weight: 900;
    color: var(--neon-cyan);
    text-shadow:
      0 0 20px var(--neon-cyan),
      0 0 80px var(--neon-cyan);
    animation: pulse 1s ease-in-out;
  }
  @keyframes pulse {
    0% { transform: scale(1.5); opacity: 0; }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── GAME CANVAS ── */
  #gameCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 16px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 10;
    pointer-events: none;
  }
  .hud-box {
    background: rgba(7,8,15,0.75);
    border: 1px solid rgba(0,245,255,0.2);
    padding: 6px 12px;
    border-radius: 3px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    backdrop-filter: blur(6px);
  }
  .hud-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    color: var(--neon-cyan);
  }
  #aliveList {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 160px;
    overflow: hidden;
  }
  .alive-entry {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.6rem;
    opacity: 0.9;
  }
  .alive-pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── DEATH SCREEN ── */
  #deathScreen {
    background: rgba(7,8,15,0.92);
    z-index: 20;
  }
  .death-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 900;
    color: var(--neon-pink);
    text-shadow: 0 0 30px var(--neon-pink), 0 0 80px rgba(255,0,144,0.5);
    margin-bottom: 8px;
  }
  .death-stat {
    color: var(--text-dim);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    margin-bottom: 40px;
  }
  .death-stat span { color: var(--neon-yellow); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: rgba(7,8,15,0.9);
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    padding: 10px 24px;
    border-radius: 3px;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    z-index: 9000;
    transition: transform 0.3s;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── SOLO BADGE ── */
  #soloBadge {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,0,144,0.15);
    border: 1px solid var(--neon-pink);
    color: var(--neon-pink);
    padding: 4px 14px;
    border-radius: 2px;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    z-index: 10;
    display: none;
  }

  /* ── MISC ── */
  .divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.07);
    margin: 16px 0;
  }
  .small-hint {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-align: center;
    margin-top: 8px;
  }
  .error-msg {
    color: var(--neon-pink);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    min-height: 20px;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<!-- Background canvas -->
<canvas id="bgCanvas"></canvas>

<!-- ══ MENU SCREEN ══ -->
<div id="menuScreen" class="screen">
  <div class="title">GeoRush</div>
  <div class="subtitle">Multiplayer · Infinite · Precision</div>
  <div class="panel">
    <div class="field-label">Username</div>
    <input type="text" id="usernameInput" placeholder="Enter your name..." maxlength="16">

    <div class="field-label">Color</div>
    <div class="color-row" id="colorRow"></div>

    <button class="btn btn-primary" id="playBtn">PLAY</button>
  </div>
</div>

<!-- ══ LOBBY SCREEN ══ -->
<div id="lobbyScreen" class="screen hidden">
  <div class="title" style="font-size:clamp(1.4rem,4vw,2.2rem);margin-bottom:4px">LOBBY</div>
  <div class="subtitle" style="margin-bottom:24px">WAITING FOR PLAYERS</div>
  <div class="panel">
    <div class="room-code-display">
      <div class="code" id="roomCodeDisplay" title="Click to copy">——————</div>
      <div class="hint">ROOM CODE · CLICK TO COPY</div>
    </div>
    <div class="field-label">PLAYERS IN ROOM</div>
    <div id="playerList"></div>
    <div class="error-msg" id="lobbyError"></div>
    <button class="btn btn-primary" id="readyBtn">READY UP</button>
    <button class="btn btn-secondary" id="leaveBtn">LEAVE ROOM</button>
    <hr class="divider">
    <div class="field-label">JOIN A DIFFERENT ROOM</div>
    <input type="text" id="joinCodeInput" placeholder="Enter room code..." maxlength="6" style="margin-bottom:8px;text-transform:uppercase">
    <button class="btn btn-secondary" id="joinRoomBtn">JOIN ROOM</button>
  </div>
</div>

<!-- ══ JOIN/CREATE SCREEN ══ -->
<div id="joinScreen" class="screen hidden">
  <div class="title" style="font-size:clamp(1.4rem,4vw,2.2rem);margin-bottom:4px">GAME MODE</div>
  <div class="subtitle" style="margin-bottom:24px">CHOOSE HOW TO PLAY</div>
  <div class="panel">
    <button class="btn btn-primary" id="createRoomBtn">CREATE ROOM</button>
    <hr class="divider">
    <div class="field-label">JOIN EXISTING ROOM</div>
    <input type="text" id="joinInput" placeholder="Room code..." maxlength="6" style="text-transform:uppercase">
    <div class="error-msg" id="joinError"></div>
    <button class="btn btn-secondary" id="joinBtn">JOIN ROOM</button>
    <hr class="divider">
    <button class="btn btn-danger" id="soloBtn">PLAY SOLO</button>
  </div>
</div>

<!-- ══ COUNTDOWN ══ -->
<div id="countdownScreen" class="screen hidden">3</div>

<!-- ══ GAME CANVAS ══ -->
<canvas id="gameCanvas" style="display:none"></canvas>

<!-- ══ HUD ══ -->
<div id="hud" style="display:none">
  <div class="hud-box">
    <div style="font-size:0.6rem;letter-spacing:0.15em;color:var(--text-dim)">DISTANCE</div>
    <div class="hud-val" id="distanceHud">0</div>
  </div>
  <div class="hud-box" id="aliveBox">
    <div style="font-size:0.6rem;letter-spacing:0.15em;color:var(--text-dim);margin-bottom:4px">ALIVE</div>
    <div id="aliveList"></div>
  </div>
</div>
<div id="soloBadge">SOLO MODE</div>

<!-- ══ DEATH SCREEN ══ -->
<div id="deathScreen" class="screen hidden">
  <div class="death-title">YOU DIED</div>
  <div class="death-stat">Distance: <span id="deathDist">0</span> &nbsp;|&nbsp; Best: <span id="bestDist">0</span></div>
  <div class="panel" style="max-width:360px">
    <button class="btn btn-primary" id="retryBtn">RETRY</button>
    <button class="btn btn-secondary" id="backLobbyBtn" style="display:none">BACK TO LOBBY</button>
    <button class="btn btn-danger" id="backMenuBtn">MAIN MENU</button>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<!-- Firebase SDK -->
<script type="module">

// ════════════════════════════════════════════════════════
//  🔥 FIREBASE CONFIG
// ════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyCUEyAC0Aib2e6L9_KkMzCPh_8_FFyQbAQ",
  authDomain:        "gdproject-e48d9.firebaseapp.com",
  databaseURL:       "https://gdproject-e48d9-default-rtdb.firebaseio.com",
  projectId:         "gdproject-e48d9",
  storageBucket:     "gdproject-e48d9.firebasestorage.app",
  messagingSenderId: "1012952792290",
  appId:             "1:1012952792290:web:fbb4e839643570b3fd72bb"
};
// ════════════════════════════════════════════════════════

// Firebase loaded via dynamic import so a network failure doesn't
// break the whole game — solo mode always works.
let db = null;
let ref, set, get, onValue, update, remove, onDisconnect, off;
let firebaseOk = false;

try {
  const fbApp = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
  const fbDb  = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js");
  const app = fbApp.initializeApp(firebaseConfig);
  db = fbDb.getDatabase(app);
  ref = fbDb.ref; set = fbDb.set; get = fbDb.get;
  onValue = fbDb.onValue; update = fbDb.update;
  remove = fbDb.remove; onDisconnect = fbDb.onDisconnect; off = fbDb.off;
  firebaseOk = true;
  console.log("Firebase connected ✓");
} catch(e) {
  console.warn("Firebase failed to load — solo mode only:", e);
}

// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const COLORS = [
  '#ff0090','#ff4444','#ff8800','#ffee00',
  '#00ff88','#00f5ff','#4488ff','#aa44ff',
  '#ffffff','#ff66cc'
];
const SHAPES = ['cube','ship','ball'];
const TILE   = 48;           // grid unit
// GRAVITY/JUMP handled per-mode in MODE_CFG
// JUMP_VEL handled per-mode in MODE_CFG
// BASE_SPEED handled in update_physics

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let playerColor = COLORS[5];
let playerShape = 'cube';
let playerName  = '';
let playerId    = Math.random().toString(36).slice(2, 10);

let roomId      = null;
let roomRef     = null;
let playerRef   = null;
let roomListeners = [];

let isSolo      = false;
let isReady     = false;
let gameRunning = false;

let otherPlayers = {};   // id -> {name, color, shape, x, y, dead}

// ─────────────────────────────────────────────
//  BACKGROUND GRID ANIMATION
// ─────────────────────────────────────────────
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx    = bgCanvas.getContext('2d');
let bgOff = 0;

function resizeBg() {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

function drawBg() {
  const W = bgCanvas.width, H = bgCanvas.height;
  bgCtx.clearRect(0,0,W,H);
  bgOff = (bgOff + 0.4) % 60;

  // Gradient sky
  const grad = bgCtx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, '#050810');
  grad.addColorStop(1, '#0a0f1e');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0,0,W,H);

  // Grid lines
  bgCtx.strokeStyle = 'rgba(0,245,255,0.04)';
  bgCtx.lineWidth = 1;
  for(let x = -bgOff % 60; x < W; x += 60) {
    bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,H); bgCtx.stroke();
  }
  for(let y = 0; y < H; y += 60) {
    bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(W,y); bgCtx.stroke();
  }
  requestAnimationFrame(drawBg);
}
drawBg();

// ─────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────
const $ = id => document.getElementById(id);
const screens = ['menuScreen','joinScreen','lobbyScreen','countdownScreen','deathScreen'];
function showScreen(id) {
  screens.forEach(s => {
    const el = $(s);
    if(el) el.classList.toggle('hidden', s !== id);
  });
  $('gameCanvas').style.display = 'none';
  $('hud').style.display = 'none';
  $('soloBadge').style.display = 'none';
  // Blur any focused element so spacebar can't accidentally activate buttons
  if(document.activeElement) document.activeElement.blur();
}
function showGame() {
  screens.forEach(s => { const el=$(s); if(el) el.classList.add('hidden'); });
  $('gameCanvas').style.display = 'block';
  $('hud').style.display = 'flex';
}

let toastTimer;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────────
//  MENU SETUP
// ─────────────────────────────────────────────
function buildColorRow() {
  const row = $('colorRow');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch' + (c === playerColor ? ' selected' : '');
    s.style.background = c;
    s.style.boxShadow = `0 0 8px ${c}88`;
    s.onclick = () => {
      playerColor = c;
      row.querySelectorAll('.swatch').forEach(x => x.classList.remove('selected'));
      s.classList.add('selected');
    };
    row.appendChild(s);
  });
}

buildColorRow();

$('playBtn').onclick = () => {
  const name = $('usernameInput').value.trim();
  if(!name) { showToast('ENTER A USERNAME'); return; }
  playerName = name;
  showScreen('joinScreen');
};

// ─────────────────────────────────────────────
//  JOIN / CREATE
// ─────────────────────────────────────────────
$('createRoomBtn').onclick = async () => {
  if(!firebaseOk) { showToast('FIREBASE NOT CONFIGURED — USE SOLO'); return; }
  roomId = genCode();
  await setupRoom(true);
};

$('joinBtn').onclick = async () => {
  const code = $('joinInput').value.trim().toUpperCase();
  if(code.length !== 6) { $('joinError').textContent = 'CODE MUST BE 6 CHARACTERS'; return; }
  $('joinError').textContent = '';
  if(!firebaseOk) { showToast('FIREBASE NOT CONFIGURED — USE SOLO'); return; }
  roomId = code;
  await setupRoom(false);
};

$('soloBtn').onclick = () => {
  isSolo = true;
  startCountdown(3);
};

function genCode() {
  return Math.random().toString(36).slice(2,8).toUpperCase();
}

// ─────────────────────────────────────────────
//  FIREBASE ROOM
// ─────────────────────────────────────────────
async function setupRoom(isCreator) {
  roomRef   = ref(db, `rooms/${roomId}`);
  playerRef = ref(db, `rooms/${roomId}/players/${playerId}`);

  if(isCreator) {
    await set(roomRef, { started: false, seed: Math.floor(Math.random()*999999) });
  } else {
    const snap = await get(roomRef);
    if(!snap.exists()) { $('joinError').textContent = 'ROOM NOT FOUND'; return; }
    if(snap.val().started) { $('joinError').textContent = 'GAME ALREADY IN PROGRESS'; return; }
  }

  // Register self
  const pData = { name: playerName, color: playerColor, shape: playerShape, ready: false, alive: true, x: 0, y: 0 };
  await set(playerRef, pData);
  onDisconnect(playerRef).remove();

  isSolo = false;
  showScreen('lobbyScreen');
  $('roomCodeDisplay').textContent = roomId;
  $('backLobbyBtn').style.display = '';
  listenLobby();
}

function listenLobby() {
  // Clear old listeners
  roomListeners.forEach(fn => fn());
  roomListeners = [];

  const playersRef = ref(db, `rooms/${roomId}/players`);
  const off1 = onValue(playersRef, snap => {
    const data = snap.val() || {};
    renderPlayerList(data);
    checkAutoStart(data);
  });
  roomListeners.push(() => off(playersRef, 'value', off1));

  // Listen for game start
  const startedRef = ref(db, `rooms/${roomId}/started`);
  const off2 = onValue(startedRef, snap => {
    if(snap.val() === true && !gameRunning) {
      roomListeners.forEach(fn => fn());
      startCountdown(3);
    }
  });
  roomListeners.push(() => off(startedRef, 'value', off2));
}

function renderPlayerList(data) {
  const list = $('playerList');
  list.innerHTML = '';
  Object.entries(data).forEach(([id, p]) => {
    const div = document.createElement('div');
    div.className = 'player-entry';
    div.innerHTML = `
      <div class="pip" style="background:${p.color};box-shadow:0 0 6px ${p.color}"></div>
      <span class="name">${p.name}${id===playerId?' (you)':''}</span>
      <span class="status ${p.ready?'status-ready':'status-waiting'}">${p.ready?'READY':'WAITING'}</span>
    `;
    list.appendChild(div);
  });
}

function checkAutoStart(data) {
  const players = Object.values(data);
  if(players.length < 1) return;
  if(players.every(p => p.ready)) {
    // All ready — first player (creator) triggers start
    const ids = Object.keys(data).sort();
    if(ids[0] === playerId) {
      update(ref(db, `rooms/${roomId}`), { started: true });
    }
  }
}

$('readyBtn').onclick = async () => {
  isReady = !isReady;
  $('readyBtn').textContent = isReady ? 'UNREADY' : 'READY UP';
  $('readyBtn').className = isReady ? 'btn btn-danger' : 'btn btn-primary';
  if(playerRef) await update(playerRef, { ready: isReady });
};

$('leaveBtn').onclick = leaveRoom;

async function leaveRoom() {
  if(playerRef) await remove(playerRef);
  roomListeners.forEach(fn => fn());
  roomListeners = [];
  roomId = null; roomRef = null; playerRef = null;
  isReady = false;
  $('readyBtn').textContent = 'READY UP';
  $('readyBtn').className = 'btn btn-primary';
  showScreen('joinScreen');
}

// Lobby join another room
$('joinRoomBtn').onclick = async () => {
  const code = $('joinCodeInput').value.trim().toUpperCase();
  if(code.length !== 6) { $('lobbyError').textContent = 'CODE MUST BE 6 CHARACTERS'; return; }
  $('lobbyError').textContent = '';
  await leaveRoom();
  roomId = code;
  await setupRoom(false);
};

$('roomCodeDisplay').onclick = () => {
  navigator.clipboard?.writeText(roomId);
  showToast('CODE COPIED!');
};

// ─────────────────────────────────────────────
//  COUNTDOWN
// ─────────────────────────────────────────────
function startCountdown(from) {
  showScreen('countdownScreen');
  const el = $('countdownScreen');
  // Kill ALL transitions on this element so the number is instant and fully visible
  el.style.cssText = 'opacity:1; transition:none;';
  const show = (val) => {
    if(val <= 0) {
      el.textContent = 'GO!';
      el.style.color = 'var(--neon-green)';
      el.style.textShadow = '0 0 20px var(--neon-green), 0 0 80px var(--neon-green)';
      setTimeout(startGame, 650);
    } else {
      el.textContent = String(val);
      el.style.color = 'var(--neon-cyan)';
      el.style.textShadow = '0 0 20px var(--neon-cyan), 0 0 80px var(--neon-cyan)';
      setTimeout(() => show(val - 1), 1000);
    }
  };
  show(from);
}

// ─────────────────────────────────────────────
//  ICON DRAWING
// ─────────────────────────────────────────────
function drawIcon(ctx, cx, cy, size, shape, color, angle) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;

  if(shape === 'cube') {
    ctx.rotate(angle);
    const hs = size * 0.85;
    ctx.fillRect(-hs/2, -hs/2, hs, hs);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(-hs/2+3, -hs/2+3, hs*0.4, hs*0.4);
    ctx.fillRect(hs/2-hs*0.4-3, -hs/2+3, hs*0.4, hs*0.4);
  } else if(shape === 'ship') {
    ctx.beginPath();
    ctx.moveTo(size*0.55, 0);
    ctx.lineTo(-size*0.5, -size*0.42);
    ctx.lineTo(-size*0.28, 0);
    ctx.lineTo(-size*0.5, size*0.42);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.arc(0, 0, size*0.18, 0, Math.PI*2); ctx.fill();
  } else if(shape === 'ball') {
    ctx.rotate(angle);
    ctx.beginPath(); ctx.arc(0, 0, size*0.48, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.arc(-size*0.12, -size*0.12, size*0.17, 0, Math.PI*2); ctx.fill();
    // equator line
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-size*0.48, 0); ctx.lineTo(size*0.48, 0); ctx.stroke();
  } else if(shape === 'wave') {
    // Diamond
    ctx.rotate(Math.PI/4);
    const hs = size * 0.5;
    ctx.fillRect(-hs/2, -hs/2, hs, hs);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(-hs/2+2, -hs/2+2, hs*0.4, hs*0.4);
  } else if(shape === 'spider') {
    // Compact octagon
    ctx.beginPath();
    const r = size*0.44, sides = 8;
    for(let i=0;i<sides;i++){
      const a = (i/sides)*Math.PI*2 - Math.PI/8;
      i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
             : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.arc(0, 0, r*0.35, 0, Math.PI*2); ctx.fill();
  } else {
    // fallback cube
    const hs = size*0.85;
    ctx.fillRect(-hs/2,-hs/2,hs,hs);
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  LEVEL GENERATION — curated beatable patterns
// ─────────────────────────────────────────────

// ─── OBSTACLE LAYOUT KEY ──────────────────────────────────────────
// { dx, type, h?, yOff?, fromCeil? }
//   dx        : x offset from pattern start (px)
//   type      : 'spike'|'block'|'saw'|'cspike'|'cblock'
//   h         : height in tiles (blocks/cblocks only)
//   yOff      : extra offset from surface, lifts obstacle off floor/ceil (default 0)
//   fromCeil  : true → anchored from ceiling downward
//
// Spike   – triangle on floor, lethal
// Cspike  – inverted triangle on ceiling, lethal
// Block   – solid, cube can land on top; ship/wave/ball/spider = lethal
// Cblock  – solid hanging from ceiling, all modes lethal
// Saw     – spinning blade on floor, lethal circle
//
// Jump physics (cube): gravity=1.05/frame², jumpVel=-15.5, baseSpeed=7.5
//   air time ≈ 29.5 frames  |  horizontal range ≈ 221px
//   peak height ≈ (15.5²)/(2×1.05) ≈ 114px ≈ 2.4 tiles
//   triple spike kill zone ≈ 137px  →  221-137 = 84px clearance  ✓

const CUBE_PAT = {
  easy: [
    [ {dx:0,type:'spike'} ],
    [ {dx:0,type:'block',h:1} ],
    [ {dx:0,type:'spike'}, {dx:TILE*3,type:'block',h:1} ],
    [ {dx:0,type:'saw'} ],
    // Floating platform after spike — variety
    [ {dx:0,type:'spike'}, {dx:TILE*3,type:'block',h:1,yOff:TILE*1} ],
  ],
  medium: [
    [ {dx:0,type:'spike'}, {dx:TILE,type:'spike'} ],
    [ {dx:0,type:'block',h:1}, {dx:TILE*2,type:'spike'} ],
    [ {dx:0,type:'saw'}, {dx:TILE*3,type:'spike'} ],
    [ {dx:0,type:'block',h:2} ],
    [ {dx:0,type:'spike'}, {dx:TILE,type:'spike'}, {dx:TILE*3.5,type:'block',h:1} ],
    [ {dx:0,type:'saw'}, {dx:TILE*2.5,type:'saw'} ],
    // Platform section: jump to mid-air block, then onto another
    [ {dx:0,type:'block',h:1,yOff:TILE*1}, {dx:TILE*2,type:'block',h:1,yOff:TILE*2}, {dx:TILE*4,type:'spike'} ],
  ],
  hard: [
    [ {dx:0,type:'block',h:2}, {dx:TILE*3,type:'spike'}, {dx:TILE*4,type:'spike'} ],
    [ {dx:0,type:'saw'}, {dx:TILE*2,type:'spike'}, {dx:TILE*3,type:'spike'}, {dx:TILE*5.5,type:'saw'} ],
    [ {dx:0,type:'spike'}, {dx:TILE*2,type:'block',h:2}, {dx:TILE*4.5,type:'spike'} ],
    [ {dx:0,type:'saw'}, {dx:TILE*1.5,type:'saw'}, {dx:TILE*4,type:'spike'}, {dx:TILE*5,type:'spike'} ],
    // Platform + spikes: must jump on platform to clear obstacle
    [ {dx:0,type:'block',h:1,yOff:TILE*1}, {dx:TILE*1.5,type:'spike'}, {dx:TILE*2.5,type:'spike'} ],
  ],
};

// Ball/Spider: floor + ceiling obstacles, forcing gravity flips / teleports
const BALL_PAT = {
  easy: [
    [ {dx:0,type:'spike'} ],
    [ {dx:0,type:'cspike'} ],                                               // ceil only
  ],
  medium: [
    [ {dx:0,type:'spike'}, {dx:TILE,type:'cspike'} ],                       // immediate flip needed
    [ {dx:0,type:'cspike'}, {dx:TILE,type:'spike'} ],
    [ {dx:0,type:'saw'}, {dx:TILE*2,type:'cspike'} ],
    [ {dx:0,type:'spike'}, {dx:TILE*2,type:'cblock',h:1} ],
  ],
  hard: [
    [ {dx:0,type:'saw'}, {dx:TILE*1.5,type:'cspike'}, {dx:TILE*3.5,type:'saw'} ],
  ],
};

// Ship/Wave: scattered obstacles with a clear flyable path
// Uses blocks from floor (h = tiles stacked), cblocks from ceiling
// The gap between them is always passable — floor_h + ceil_h ≤ 6 tiles
const SHIP_PAT = {
  easy: [
    [ {dx:0,type:'block',h:2} ],                                              // floor wall, fly over
    [ {dx:0,type:'cblock',h:2} ],                                             // ceil wall, fly under
    [ {dx:0,type:'block',h:2}, {dx:TILE*4,type:'cblock',h:2} ],              // S-curve
    [ {dx:0,type:'cblock',h:2}, {dx:TILE*4,type:'block',h:2} ],
    [ {dx:0,type:'block',h:1,yOff:TILE*3} ],                                 // mid-air block, dodge it
  ],
  medium: [
    [ {dx:0,type:'block',h:3} ],
    [ {dx:0,type:'cblock',h:3} ],
    [ {dx:0,type:'block',h:2}, {dx:TILE*2.5,type:'cblock',h:2} ],
    [ {dx:0,type:'block',h:3}, {dx:TILE*4,type:'cblock',h:3} ],
    [ {dx:0,type:'block',h:1,yOff:TILE*2}, {dx:TILE*3,type:'cblock',h:1} ],  // float + ceil
    [ {dx:0,type:'saw'}, {dx:TILE*2,type:'cblock',h:2} ],
    [ {dx:0,type:'block',h:2}, {dx:TILE*1.5,type:'block',h:1,yOff:TILE*3} ],
  ],
  hard: [
    [ {dx:0,type:'block',h:3}, {dx:TILE*2,type:'cblock',h:3} ],
    [ {dx:0,type:'cblock',h:3}, {dx:TILE*2,type:'block',h:3} ],
    [ {dx:0,type:'block',h:2}, {dx:TILE*2,type:'block',h:1,yOff:TILE*3}, {dx:TILE*4,type:'cblock',h:2} ],
    [ {dx:0,type:'saw'}, {dx:TILE*2,type:'cblock',h:2}, {dx:TILE*5,type:'saw'} ],
    [ {dx:0,type:'block',h:4}, {dx:TILE*3,type:'cblock',h:4} ],              // very tight
  ],
};

const WAVE_PAT = SHIP_PAT;  // wave uses same patterns, relies on mode physics for difficulty

class LevelGen {
  constructor(seed) {
    this.seed      = seed || 12345;
    this.obstacles = [];
    this.portals   = [];
    this.genX      = 600;
    this.lastObsEnd = 350;
    this.difficulty = 0;
    this.nextPortalX = 2000;
    this.modeSeq   = ['cube','ball','ship','wave','spider','cube'];
    this.modeIdx   = 0;
    this.genMode   = 'cube';  // mode currently being generated for
  }

  rng() {
    this.seed = (this.seed * 1664525 + 1013904223) & 0xffffffff;
    return (this.seed >>> 0) / 0xffffffff;
  }

  setDifficulty(dist) { this.difficulty = Math.min(1, dist / 12000); }

  ensureAhead(viewX) {
    while(this.genX < viewX + 1400) this.generateChunk();
  }

  generateChunk() {
    const D = this.difficulty;

    // ── Portal checkpoint ──
    if(this.genX >= this.nextPortalX) {
      this.modeIdx = (this.modeIdx + 1) % this.modeSeq.length;
      const nextMode = this.modeSeq[this.modeIdx];
      // Portal sits on floor: 3-tile tall gate
      this.portals.push({ x: this.genX, mode: nextMode });
      this.genX += 300;          // clear zone after portal
      this.lastObsEnd = this.genX;
      this.genMode = nextMode;   // future chunks use new mode patterns
      this.nextPortalX = this.genX + 1800 + this.rng()*900;
      return;
    }

    // ── Gap before next pattern ──
    const isFly = this.genMode === 'ship' || this.genMode === 'wave';
    const minGap = isFly
      ? Math.max(100, 160 - D*50 + this.rng()*80)
      : (D < 0.15 ? 260 + this.rng()*120 : Math.max(130, 220 - D*80 + this.rng()*100));

    this.genX = this.lastObsEnd + minGap;

    // ── Pick pattern ──
    const pool = this.getPool(D);
    const pat  = pool[Math.floor(this.rng() * pool.length)];

    let patMaxX = 0;
    for(const item of pat) {
      const obs = {
        x: this.genX + item.dx,
        type: item.type,
        w: TILE,
        h: TILE * (item.h || 1),
        yOff: (item.yOff || 0),
        fromCeil: !!(item.fromCeil || item.type === 'cspike' || item.type === 'cblock'),
      };
      if(item.type === 'saw') obs.r = TILE * 0.42;
      this.obstacles.push(obs);
      patMaxX = Math.max(patMaxX, item.dx + obs.w);
    }
    this.lastObsEnd = this.genX + patMaxX;
    this.genX = this.lastObsEnd;
  }

  getPool(D) {
    const m = this.genMode;
    let pats;
    if(m === 'ball' || m === 'spider') pats = BALL_PAT;
    else if(m === 'ship' || m === 'wave')  pats = SHIP_PAT;
    else pats = CUBE_PAT;

    if(D < 0.2)      return pats.easy;
    else if(D < 0.5) return pats.medium;
    else             return this.rng() < 0.35 ? pats.medium : pats.hard;
  }

  prune(viewX) {
    this.obstacles = this.obstacles.filter(o => o.x + (o.w||TILE) > viewX - 300);
    this.portals   = this.portals.filter(p => p.x > viewX - 300);
  }
}

// ─────────────────────────────────────────────
//  GAME ENGINE
// ─────────────────────────────────────────────
const gameCanvas = $('gameCanvas');
const gctx = gameCanvas.getContext('2d');

let player, level, camX, bgStars, animId;
let bestDist = 0;
let syncInterval;
let otherRef;
let gameSeed;
let sawAngle = 0;
let currentMode = 'cube';   // active game mode
let modeBanner  = null;     // {text, alpha, timer}

const FLOOR_Y_RATIO = 0.72;

// ─── MODE PHYSICS CONFIGS ───
const MODE_CFG = {
  cube:   { gravity: 1.05, jumpVel: -15.5, hasGravity: true  },
  ball:   { gravity: 1.05, jumpVel: null,  hasGravity: true  },  // flip gravity
  ship:   { gravity: 0.55, jumpVel: null,  hasGravity: true  },  // hold to fly
  wave:   { gravity: 0,    jumpVel: null,  hasGravity: false },   // auto diagonal
  spider: { gravity: 1.05, jumpVel: null,  hasGravity: true  },  // teleport
};

function startGame() {
  gameRunning = true;
  resizeGame();
  window.addEventListener('resize', resizeGame);

  const doStart = (seed) => {
    gameSeed = seed;
    level = new LevelGen(seed);
    generateStars();
    currentMode = 'cube';
    modeBanner  = null;
    sawAngle    = 0;

    const floorY = gameCanvas.height * FLOOR_Y_RATIO;
    player = {
      x: 140, y: floorY - TILE,
      vy: 0,
      alive: true,
      angle: 0,
      onGround: false,
      gravDir: 1,   // 1 = normal, -1 = flipped (ball mode)
      dist: 0,
      holdingJump: false,
    };
    camX = 0;
    showGame();
    if(isSolo) $('soloBadge').style.display = 'block';
    $('aliveBox').style.display = isSolo ? 'none' : 'flex';

    if(!isSolo && db) {
      listenOthers();
      syncInterval = setInterval(syncPosition, 80);
    }
    if(animId) cancelAnimationFrame(animId);
    lastTime = performance.now() - 16;
    animId = requestAnimationFrame(gameLoop);
    setupInput();
  };

  if(!isSolo && db && roomId) {
    get(ref(db, `rooms/${roomId}/seed`)).then(snap => {
      doStart(snap.val() || Math.random()*999999|0);
    }).catch(() => doStart(Math.random()*999999|0));
  } else {
    doStart(Math.random()*999999|0);
  }
}

function resizeGame() {
  gameCanvas.width  = window.innerWidth;
  gameCanvas.height = window.innerHeight;
}

function generateStars() {
  bgStars = [];
  for(let i=0; i<120; i++) {
    bgStars.push({
      x: Math.random()*10000,
      y: Math.random()*gameCanvas.height*0.65,
      r: Math.random()*1.5,
      spd: 0.1 + Math.random()*0.4,
      alpha: 0.2 + Math.random()*0.6
    });
  }
}

// ─── INPUT ───
let holdJump = false;
function setupInput() {
  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('keyup',   onKeyUp);
  document.addEventListener('touchstart', onTouch, {passive:true});
  document.addEventListener('touchend',   onTouchEnd, {passive:true});
  gameCanvas.addEventListener('mousedown', onMouse);
  gameCanvas.addEventListener('mouseup',   onMouseUp);
}
function teardownInput() {
  document.removeEventListener('keydown', onKeyDown);
  document.removeEventListener('keyup',   onKeyUp);
  document.removeEventListener('touchstart', onTouch);
  document.removeEventListener('touchend',   onTouchEnd);
  gameCanvas.removeEventListener('mousedown', onMouse);
  gameCanvas.removeEventListener('mouseup',   onMouseUp);
}

function onKeyDown(e) {
  if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    if(!holdJump) pressAction();
    holdJump = true;
  }
}
function onKeyUp(e) {
  if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') holdJump = false;
}
function onTouch(e)    { if(!holdJump) pressAction(); holdJump = true; }
function onTouchEnd()  { holdJump = false; }
function onMouse()     { if(!holdJump) pressAction(); holdJump = true; }
function onMouseUp()   { holdJump = false; }

function pressAction() {
  if(!player || !player.alive) return;
  const cfg = MODE_CFG[currentMode];
  switch(currentMode) {
    case 'cube':
      if(player.onGround) {
        player.vy = cfg.jumpVel;
        player.onGround = false;
        if(!isSolo && db && playerRef) update(playerRef, { jumped: Date.now() });
      }
      break;
    case 'ball':
      // Flip gravity
      player.gravDir *= -1;
      player.vy = 0;
      break;
    case 'spider':
      // Teleport to opposite surface
      doSpiderTeleport();
      break;
    // ship and wave handled by holdJump in physics
  }
}

function doSpiderTeleport() {
  const H = gameCanvas.height;
  const floorY = H * FLOOR_Y_RATIO;
  const ceilY  = floorY * 0.08;
  if(player.gravDir === 1) {
    // On floor, teleport to ceiling
    player.y = ceilY;
    player.gravDir = -1;
    player.vy = 0;
  } else {
    // On ceiling, teleport to floor
    player.y = floorY - TILE;
    player.gravDir = 1;
    player.vy = 0;
  }
}

// ─── FIREBASE SYNC ───
function syncPosition() {
  if(!playerRef || !player) return;
  update(playerRef, { x: Math.round(player.x + camX), y: Math.round(player.y), alive: player.alive });
}
function listenOthers() {
  otherRef = ref(db, `rooms/${roomId}/players`);
  onValue(otherRef, snap => {
    const data = snap.val() || {};
    Object.entries(data).forEach(([id, p]) => {
      if(id === playerId) return;
      otherPlayers[id] = { ...p };
    });
    Object.keys(otherPlayers).forEach(id => { if(!data[id]) delete otherPlayers[id]; });
    updateAliveHud();
  });
}
function updateAliveHud() {
  const list = $('aliveList');
  list.innerHTML = '';
  const selfDiv = document.createElement('div');
  selfDiv.className = 'alive-entry';
  selfDiv.innerHTML = `<div class="alive-pip" style="background:${playerColor}"></div><span>${playerName} (you)</span>`;
  list.appendChild(selfDiv);
  Object.values(otherPlayers).forEach(p => {
    const d = document.createElement('div');
    d.className = 'alive-entry';
    d.style.opacity = p.alive === false ? '0.3' : '0.9';
    d.innerHTML = `<div class="alive-pip" style="background:${p.color||'#888'}"></div><span>${p.name||'?'}${p.alive===false?' ✗':''}</span>`;
    list.appendChild(d);
  });
}

// ─── GAME LOOP ───
let lastTime = 0;
function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 2.5);
  lastTime = ts;
  sawAngle += 0.06 * dt;
  update_physics(dt);
  render();
  if(player.alive) animId = requestAnimationFrame(gameLoop);
  else endGame();
}

function update_physics(dt) {
  if(!player.alive) return;

  const H = gameCanvas.height;
  const floorY = H * FLOOR_Y_RATIO;
  // Ceiling is 10% from the top — only lethal in fly modes
  const ceilY = H * 0.06;

  const speed = 7.5 + Math.min(player.dist / 5000, 3.0);
  camX += speed * dt;
  player.dist = Math.round(camX / TILE * 2) / 2;

  const cfg = MODE_CFG[currentMode];
  const gDir = player.gravDir;

  // ── MODE PHYSICS ──
  if(currentMode === 'cube') {
    player.vy += cfg.gravity * gDir * dt;
    player.y  += player.vy * dt;

  } else if(currentMode === 'ball') {
    player.vy += cfg.gravity * gDir * dt;
    player.y  += player.vy * dt;

  } else if(currentMode === 'ship') {
    if(holdJump) player.vy -= 1.3 * dt;
    else         player.vy += cfg.gravity * dt;
    player.vy = Math.max(-11, Math.min(11, player.vy));
    player.y += player.vy * dt;

  } else if(currentMode === 'wave') {
    const waveSpd = 5.5;
    player.vy = holdJump ? -waveSpd : waveSpd;
    player.y += player.vy * dt;

  } else if(currentMode === 'spider') {
    player.vy += cfg.gravity * gDir * dt;
    player.y  += player.vy * dt;
  }

  // ── FLOOR / CEILING COLLISION ──
  player.onGround = false;

  if(gDir === 1) {
    // Normal gravity: floor below, ceiling above
    if(player.y >= floorY - TILE) {
      player.y = floorY - TILE; player.vy = 0; player.onGround = true;
    }
    if(player.y < ceilY) {
      // Ship dies on ceiling; all other modes clamp
      if(currentMode === 'ship') {
        killPlayer();
      } else {
        player.y = ceilY; player.vy = Math.max(0, player.vy);
      }
    }
  } else {
    // Flipped gravity (ball mode): ceiling is floor, floor is ceiling
    if(player.y <= ceilY) {
      player.y = ceilY; player.vy = 0; player.onGround = true;
    }
    if(player.y > floorY - TILE) {
      if(currentMode === 'ship') { player.y = floorY - TILE; player.vy = 0; }
      else killPlayer();
    }
  }

  // ── CUBE ROTATION ──
  if(currentMode === 'cube') {
    if(!player.onGround) {
      player.angle += 0.12 * dt;
    } else {
      const snap = Math.round(player.angle / (Math.PI/2)) * (Math.PI/2);
      player.angle += (snap - player.angle) * 0.3;
    }
  } else if(currentMode === 'ball') {
    player.angle += 0.09 * gDir * dt;
  } else {
    player.angle = 0;
  }

  // ── LEVEL GEN ──
  level.setDifficulty(camX);
  level.ensureAhead(camX);
  level.prune(camX);

  // ── PORTAL CHECK ──
  for(const portal of level.portals) {
    const px = portal.x - camX + player.x;
    if(px > -10 && px < 50 && !portal.used) {
      portal.used = true;
      switchMode(portal.mode);
    }
  }

  // ── OBSTACLE COLLISION ──
  // GD-accurate hitboxes (scaled from GD 30-unit tile to our 48px tile)
  const P_OUT_INSET = 4,  P_OUT_SIZE = TILE - 8;   // outer 40×40 (blocks)
  const P_IN_SIZE   = 30, P_IN_INSET = (TILE-30)/2; // inner 30×30 (lethal)
  const SP_W = 16, SP_H = 32, SP_X_INSET = 16;       // spike 16×32, centered

  const px = player.x, py = player.y;
  const isFly = currentMode === 'ship' || currentMode === 'wave';

  for(const obs of level.obstacles) {
    const ox = obs.x - camX + player.x;

    // ─ Saw ─
    if(obs.type === 'saw') {
      const scx = ox + TILE/2;
      const scy = floorY - obs.r - (obs.yOff||0);
      const bx1 = px+P_IN_INSET, bx2 = bx1+P_IN_SIZE;
      const by1 = py+P_IN_INSET, by2 = by1+P_IN_SIZE;
      const nx = Math.max(bx1,Math.min(scx,bx2));
      const ny = Math.max(by1,Math.min(scy,by2));
      if((nx-scx)**2+(ny-scy)**2 < obs.r*obs.r) { killPlayer(); break; }
      continue;
    }

    // ─ Floor spike ─
    if(obs.type === 'spike') {
      const baseY = floorY - (obs.yOff||0);
      const hitX = ox + SP_X_INSET, hitY = baseY - TILE + 4;
      if(rectsOverlap(px+P_IN_INSET,py+P_IN_INSET,P_IN_SIZE,P_IN_SIZE, hitX,hitY,SP_W,SP_H))
        { killPlayer(); break; }
      continue;
    }

    // ─ Ceiling spike ─
    if(obs.type === 'cspike') {
      const baseY = ceilY + (obs.yOff||0);
      const hitX = ox + SP_X_INSET, hitY = baseY + 4;  // tip area
      if(rectsOverlap(px+P_IN_INSET,py+P_IN_INSET,P_IN_SIZE,P_IN_SIZE, hitX,hitY,SP_W,SP_H))
        { killPlayer(); break; }
      continue;
    }

    // ─ Block / cblock ─
    let oy;
    if(obs.fromCeil) {
      oy = ceilY + (obs.yOff||0);
    } else {
      oy = floorY - obs.h - (obs.yOff||0);
    }

    if(rectsOverlap(px+P_OUT_INSET,py+P_OUT_INSET,P_OUT_SIZE,P_OUT_SIZE, ox,oy,obs.w,obs.h)) {
      const canLand = !isFly && !obs.fromCeil && (obs.yOff||0) === 0;
      if(!canLand) {
        // Ship/wave, ceiling blocks, and floating mid-air blocks are all lethal
        killPlayer(); break;
      }
      // Floor block: cube/ball/spider can land on top
      const playerBottom = py + P_OUT_INSET + P_OUT_SIZE;
      const overlapDepth = playerBottom - oy;
      if(overlapDepth <= 30 && player.vy >= -2) {
        player.y = oy - P_OUT_INSET - P_OUT_SIZE;
        player.vy = 0;
        player.onGround = true;
      } else {
        killPlayer(); break;
      }
    }
  }

  if(player.y > H + 200) killPlayer();
}

function switchMode(newMode) {
  currentMode = newMode;
  player.gravDir = 1;
  player.vy = 0;
  player.angle = 0;
  holdJump = false;
  modeBanner = { text: newMode.toUpperCase() + ' MODE', alpha: 1.0, timer: 120 };
  // Snap player to floor
  const floorY = gameCanvas.height * FLOOR_Y_RATIO;
  player.y = floorY - TILE;
}

function rectsOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}
function killPlayer() {
  player.alive = false;
  if(!isSolo && db && playerRef) update(playerRef, { alive: false });
}

// ─── RENDER ───
function render() {
  const W = gameCanvas.width, H = gameCanvas.height;
  const floorY = H * FLOOR_Y_RATIO;
  gctx.clearRect(0,0,W,H);
  drawGameBg(W, H, floorY);
  drawPortals(W, H, floorY);
  drawObstacles(W, H, floorY);
  drawOtherPlayers(floorY);
  drawPlayer(floorY);
  drawModeBanner(W, H);
  drawHudValues();
}

const MODE_COLORS = {
  cube:'#00f5ff', ball:'#ff8800', ship:'#aa44ff', wave:'#00ff88', spider:'#ff0090'
};

function drawGameBg(W, H, floorY) {
  const modeColor = MODE_COLORS[currentMode] || '#00f5ff';
  const g = gctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, '#050810');
  g.addColorStop(0.7, '#0a0e1c');
  g.addColorStop(1, '#0d1428');
  gctx.fillStyle = g;
  gctx.fillRect(0,0,W,H);

  bgStars.forEach(star => {
    const sx = ((star.x - camX * star.spd) % (W+40) + W+40) % (W+40);
    gctx.globalAlpha = star.alpha;
    gctx.fillStyle = '#ffffff';
    gctx.beginPath(); gctx.arc(sx, star.y, star.r, 0, Math.PI*2); gctx.fill();
  });
  gctx.globalAlpha = 1;

  // Ceiling line
  const ceilY = floorY * 0.08;
  gctx.fillStyle = modeColor + '40';
  gctx.fillRect(0, ceilY, W, 2);

  // Floor
  gctx.fillStyle = '#0e1526';
  gctx.fillRect(0, floorY, W, H - floorY);
  gctx.fillStyle = modeColor + 'cc';
  gctx.fillRect(0, floorY, W, 2);

  // Floor grid
  gctx.strokeStyle = modeColor + '10';
  gctx.lineWidth = 1;
  const gridOff = camX % TILE;
  for(let x = -gridOff; x < W; x += TILE) {
    gctx.beginPath(); gctx.moveTo(x, floorY); gctx.lineTo(x, H); gctx.stroke();
  }
}

function drawPortals(W, H, floorY) {
  const PORTAL_H = TILE * 3.5;   // 3.5 tiles tall, sitting on floor — reachable from any position
  const PORTAL_W = TILE * 1.2;   // slightly wider than a tile
  for(const portal of level.portals) {
    const sx = portal.x - camX + player.x;
    if(sx < -100 || sx > W + 100) continue;
    const col = MODE_COLORS[portal.mode] || '#ffffff';
    const top = floorY - PORTAL_H;
    gctx.save();
    // Glow fill
    gctx.fillStyle = col + '14';
    gctx.fillRect(sx, top, PORTAL_W, PORTAL_H);
    // Left pillar
    gctx.shadowColor = col; gctx.shadowBlur = 18;
    gctx.strokeStyle = col; gctx.lineWidth = 3;
    gctx.beginPath(); gctx.moveTo(sx, top); gctx.lineTo(sx, floorY); gctx.stroke();
    // Right pillar
    gctx.beginPath(); gctx.moveTo(sx+PORTAL_W, top); gctx.lineTo(sx+PORTAL_W, floorY); gctx.stroke();
    // Top crossbar
    gctx.beginPath(); gctx.moveTo(sx, top); gctx.lineTo(sx+PORTAL_W, top); gctx.stroke();
    // Mode label above gate
    gctx.shadowBlur = 8; gctx.fillStyle = col;
    gctx.font = 'bold 10px "Orbitron", sans-serif';
    gctx.textAlign = 'center';
    gctx.fillText(portal.mode.toUpperCase(), sx + PORTAL_W/2, top - 8);
    // Mode icon (small preview of the shape)
    drawIcon(gctx, sx + PORTAL_W/2, floorY - TILE*1.5, TILE*0.6, portal.mode, col, 0);
    gctx.restore();
  }
}

function drawObstacles(W, H, floorY) {
  const ceilY = H * 0.06;
  for(const obs of level.obstacles) {
    const sx = obs.x - camX + player.x;
    if(sx > W+80 || sx + (obs.w||TILE) < -80) continue;

    if(obs.type === 'spike') {
      drawSpike(sx, floorY - (obs.yOff||0), obs.w, false);
    } else if(obs.type === 'cspike') {
      drawSpike(sx, ceilY + (obs.yOff||0), obs.w, true);
    } else if(obs.type === 'saw') {
      drawSaw(sx + TILE/2, floorY - obs.r - (obs.yOff||0), obs.r);
    } else {
      // block or cblock
      let sy;
      if(obs.fromCeil) {
        sy = ceilY + (obs.yOff||0);
      } else {
        sy = floorY - obs.h - (obs.yOff||0);
      }
      drawBlock(sx, sy, obs.w, obs.h, obs.fromCeil);
    }
  }
}

function drawSpike(sx, baseY, w, fromCeil) {
  gctx.save();
  gctx.fillStyle = '#ff1144';
  gctx.shadowColor = '#ff1144'; gctx.shadowBlur = 10;
  gctx.beginPath();
  if(fromCeil) {
    // Inverted: base at top (ceilY), tip points downward
    gctx.moveTo(sx, baseY);
    gctx.lineTo(sx + w/2, baseY + TILE*0.95);
    gctx.lineTo(sx + w, baseY);
  } else {
    // Normal: base at bottom (floorY), tip points upward
    gctx.moveTo(sx, baseY);
    gctx.lineTo(sx + w/2, baseY - TILE*0.95);
    gctx.lineTo(sx + w, baseY);
  }
  gctx.closePath(); gctx.fill();
  gctx.strokeStyle = '#ff6688'; gctx.lineWidth = 1; gctx.shadowBlur = 0;
  gctx.stroke();
  gctx.restore();
}

function drawSaw(cx, cy, r) {
  gctx.save();
  gctx.translate(cx, cy);
  gctx.rotate(sawAngle);
  gctx.shadowColor = '#ff6600'; gctx.shadowBlur = 14;
  // Outer teeth
  const teeth = 8;
  gctx.beginPath();
  for(let i=0; i<teeth; i++) {
    const a1 = (i/teeth)*Math.PI*2;
    const a2 = ((i+0.5)/teeth)*Math.PI*2;
    const a3 = ((i+1)/teeth)*Math.PI*2;
    if(i===0) gctx.moveTo(Math.cos(a1)*r*0.65, Math.sin(a1)*r*0.65);
    gctx.lineTo(Math.cos(a2)*r, Math.sin(a2)*r);
    gctx.lineTo(Math.cos(a3)*r*0.65, Math.sin(a3)*r*0.65);
  }
  gctx.closePath();
  gctx.fillStyle = '#cc4400'; gctx.fill();
  gctx.strokeStyle = '#ff8844'; gctx.lineWidth = 1.5; gctx.stroke();
  // Center
  gctx.shadowBlur = 0;
  gctx.beginPath(); gctx.arc(0,0,r*0.28,0,Math.PI*2);
  gctx.fillStyle = '#ff6622'; gctx.fill();
  gctx.restore();
}

function drawBlock(sx, sy, w, h, fromCeil) {
  gctx.save();
  const color = fromCeil ? '#cc44ff' : '#3366ff';
  gctx.fillStyle = color + '2a';
  gctx.strokeStyle = color;
  gctx.shadowColor = color; gctx.shadowBlur = 8;
  gctx.lineWidth = 1.5;
  gctx.fillRect(sx, sy, w, h);
  gctx.strokeRect(sx+0.75, sy+0.75, w-1.5, h-1.5);
  gctx.strokeStyle = color + '30'; gctx.lineWidth = 1; gctx.shadowBlur = 0;
  for(let i=0; i<=h; i+=TILE) {
    gctx.beginPath(); gctx.moveTo(sx,sy+i); gctx.lineTo(sx+w,sy+i); gctx.stroke();
  }
  gctx.restore();
}

function drawOtherPlayers(floorY) {
  Object.entries(otherPlayers).forEach(([id, op]) => {
    if(op.alive === false) return;
    const screenX = (op.x||0) - camX + player.x;
    const screenY = op.y || floorY - TILE;
    gctx.globalAlpha = 0.6;
    drawIcon(gctx, screenX + TILE/2, screenY + TILE/2, TILE, op.shape||'cube', op.color||'#888', 0);
    gctx.globalAlpha = 1;
    gctx.save();
    gctx.fillStyle = 'rgba(255,255,255,0.7)';
    gctx.font = '10px "Share Tech Mono",monospace';
    gctx.textAlign = 'center';
    gctx.fillText(op.name||'?', screenX + TILE/2, screenY - 6);
    gctx.restore();
  });
}

function drawPlayer(floorY) {
  if(!player.alive) return;
  const cx = player.x + TILE/2;
  const cy = player.y + TILE/2;
  const col = playerColor;

  // Trail
  gctx.save();
  for(let i=1; i<=6; i++) {
    gctx.globalAlpha = 0.05*(7-i);
    gctx.fillStyle = col; gctx.shadowColor = col; gctx.shadowBlur = 4;
    gctx.beginPath();
    gctx.arc(cx - i*9, cy, TILE*0.28, 0, Math.PI*2); gctx.fill();
  }
  gctx.globalAlpha = 1; gctx.restore();

  // Icon shape = current game mode
  drawIcon(gctx, cx, cy, TILE, currentMode, col, player.angle);

  // Ground glow
  if(player.onGround) {
    gctx.save();
    const lg = gctx.createRadialGradient(cx, floorY, 0, cx, floorY, 36);
    lg.addColorStop(0, col+'44'); lg.addColorStop(1, 'transparent');
    gctx.fillStyle = lg;
    gctx.fillRect(cx-36, floorY-4, 72, 8);
    gctx.restore();
  }
}

function drawModeBanner(W, H) {
  if(!modeBanner || modeBanner.alpha <= 0) return;
  modeBanner.timer--;
  if(modeBanner.timer < 30) modeBanner.alpha -= 0.033;
  const col = MODE_COLORS[currentMode] || '#fff';
  gctx.save();
  gctx.globalAlpha = modeBanner.alpha;
  gctx.font = 'bold 28px "Orbitron", sans-serif';
  gctx.textAlign = 'center';
  gctx.fillStyle = col;
  gctx.shadowColor = col; gctx.shadowBlur = 20;
  gctx.fillText(modeBanner.text, W/2, H*0.35);
  gctx.restore();
}

function drawHudValues() {
  $('distanceHud').textContent = Math.floor(player.dist);
}

// ─── END GAME ───
function endGame() {
  gameRunning = false;
  teardownInput();
  clearInterval(syncInterval);
  if(player.dist > bestDist) bestDist = player.dist;
  $('deathDist').textContent = Math.floor(player.dist);
  $('bestDist').textContent  = Math.floor(bestDist);
  $('backLobbyBtn').style.display = isSolo ? 'none' : '';
  setTimeout(() => showScreen('deathScreen'), 400);
}

// ─── DEATH SCREEN BUTTONS ───
$('retryBtn').onclick = () => {
  otherPlayers = {};
  if(!isSolo && db && roomId) isSolo = true;
  startCountdown(3);
};

$('backLobbyBtn').onclick = async () => {
  isSolo = false;
  if(!db || !roomId) { showScreen('joinScreen'); return; }
  playerRef = ref(db, `rooms/${roomId}/players/${playerId}`);
  const pData = { name: playerName, color: playerColor, shape: playerShape, ready: false, alive: true, x: 0, y: 0 };
  await set(playerRef, pData);
  onDisconnect(playerRef).remove();
  isReady = false;
  $('readyBtn').textContent = 'READY UP';
  $('readyBtn').className = 'btn btn-primary';
  await update(ref(db, `rooms/${roomId}`), { started: false });
  showScreen('lobbyScreen');
  listenLobby();
};

$('backMenuBtn').onclick = () => {
  if(playerRef) remove(playerRef);
  roomListeners.forEach(fn => fn());
  roomListeners = [];
  otherPlayers = {};
  roomId = null; roomRef = null; playerRef = null;
  isReady = false; isSolo = false;
  showScreen('menuScreen');
};

// ─── INIT ───
showScreen('menuScreen');

</script>
</body>
</html>
